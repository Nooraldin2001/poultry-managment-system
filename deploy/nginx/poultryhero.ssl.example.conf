# Poultry Hero — FULL production Nginx example (HTTP + HTTPS + tenant wildcard).
#
# Install base HTTP config from poultryhero.conf, then either:
#   A) certbot --nginx -d poultryhero.solutions -d www.poultryhero.solutions \
#        -d admin.poultryhero.solutions -d demo.poultryhero.solutions \
#        -d '*.poultryhero.solutions'
#   B) certbot certonly --manual --preferred-challenges dns \
#        -d poultryhero.solutions -d '*.poultryhero.solutions'
#      then merge this SSL block into /etc/nginx/sites-available/poultryhero.conf
#
# CRITICAL: server_name MUST include *.poultryhero.solutions on BOTH :80 and :443.
# Without it, tenant hosts (e.g. firstview.poultryhero.solutions) fall through to
# the default SSL server — often an old BizManager Pro site — causing wrong app + cert warnings.

upstream poultryhero_backend {
    server unix:/run/poultryhero/gunicorn.sock;
}

# --- HTTP → HTTPS redirect (all hosts including tenant wildcard) ---
server {
    listen 80;
    listen [::]:80;
    server_name poultryhero.solutions www.poultryhero.solutions admin.poultryhero.solutions demo.poultryhero.solutions *.poultryhero.solutions;
    return 301 https://$host$request_uri;
}

# --- HTTPS (Poultry Hero SPA + API) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name poultryhero.solutions www.poultryhero.solutions admin.poultryhero.solutions demo.poultryhero.solutions *.poultryhero.solutions;

    # Replace with certbot paths (wildcard cert recommended):
    ssl_certificate     /etc/letsencrypt/live/poultryhero.solutions/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poultryhero.solutions/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    root /var/www/poultryhero/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://poultryhero_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /django-admin/ {
        proxy_pass http://poultryhero_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/poultryhero/backend/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /var/www/poultryhero/backend/media/;
        access_log off;
        expires 30d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
