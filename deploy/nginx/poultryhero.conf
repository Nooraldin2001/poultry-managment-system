# Poultry Hero — Nginx site (HTTP / port 80).
#
# Certbot (python3-certbot-nginx) will edit this file in place to add the
# managed SSL (443) server block and the HTTP->HTTPS redirect. Do not add
# certificate paths here manually.

upstream poultryhero_backend {
    server unix:/run/poultryhero/gunicorn.sock;
}

server {
    listen 80;
    listen [::]:80;

    server_name poultryhero.solutions www.poultryhero.solutions admin.poultryhero.solutions demo.poultryhero.solutions *.poultryhero.solutions;

    client_max_body_size 20M;

    # --- Django API ---
    location /api/ {
        proxy_pass http://poultryhero_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django admin ---
    # NOTE: this project mounts Django's admin at /django-admin/ (the /admin/
    # path is an API namespace, already covered by /api/ above).
    location /django-admin/ {
        proxy_pass http://poultryhero_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django collected static ---
    location /static/ {
        alias /var/www/poultryhero/backend/staticfiles/;
        access_log off;
        expires 30d;
    }

    # --- User-uploaded media ---
    location /media/ {
        alias /var/www/poultryhero/backend/media/;
        access_log off;
        expires 30d;
    }

    # --- Frontend SPA (Vite build) ---
    root /var/www/poultryhero/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
