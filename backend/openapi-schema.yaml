components:
  schemas:
    AllocationTypeEnum:
      enum:
      - sales_invoice
      - purchase_invoice
      - account_level
      type: string
      description: |-
        * `sales_invoice` - Sales Invoice
        * `purchase_invoice` - Purchase Invoice
        * `account_level` - Account Level
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        company:
          type: integer
          readOnly: true
          nullable: true
        user:
          type: integer
          readOnly: true
          nullable: true
        user_email:
          type: string
          format: email
          readOnly: true
        module:
          type: string
          readOnly: true
        action:
          type: string
          readOnly: true
        reference_type:
          type: string
          readOnly: true
        reference_id:
          type: string
          readOnly: true
        previous_value:
          readOnly: true
          nullable: true
        new_value:
          readOnly: true
          nullable: true
        reason:
          type: string
          readOnly: true
        risk_level:
          allOf:
          - $ref: '#/components/schemas/RiskLevelEnum'
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - company
      - created_at
      - id
      - ip_address
      - module
      - new_value
      - previous_value
      - reason
      - reference_id
      - reference_type
      - risk_level
      - user
      - user_email
    BlankEnum:
      enum:
      - ''
    CategoryTypeEnum:
      enum:
      - daily
      - monthly
      - recurring
      - purchase_linked
      - general
      type: string
      description: |-
        * `daily` - Daily
        * `monthly` - Monthly
        * `recurring` - Recurring
        * `purchase_linked` - Purchase Linked
        * `general` - General
    CodeEnum:
      enum:
      - basic
      - pro
      - enterprise
      type: string
      description: |-
        * `basic` - Basic
        * `pro` - Pro
        * `enterprise` - Enterprise
    Company:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name_ar:
          type: string
          maxLength: 255
        name_en:
          type: string
